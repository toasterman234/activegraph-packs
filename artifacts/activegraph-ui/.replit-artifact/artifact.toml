kind = "web"
previewPath = "/"
title = "ActiveGraph Inspector"
version = "1.0.0"
id = "artifacts/activegraph-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/activegraph-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/activegraph-ui", "run", "build" ]
publicDir = "artifacts/activegraph-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
