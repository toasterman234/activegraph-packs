openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activegraph
    description: ActiveGraph runtime inspection
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /activegraph/trace:
    get:
      operationId: getTrace
      tags: [activegraph]
      summary: Get event trace
      description: Returns paginated event log, optionally filtered
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: pack
          in: query
          schema: { type: string }
          description: Filter by pack name
        - name: frame_id
          in: query
          schema: { type: string }
          description: Filter by frame id
        - name: event_type
          in: query
          schema: { type: string }
          description: Filter by event type
      responses:
        "200":
          description: Event trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceResponse"

  /activegraph/graph:
    get:
      operationId: getGraph
      tags: [activegraph]
      summary: Get graph state
      description: Returns all objects and relations in the current graph
      parameters:
        - name: pack
          in: query
          schema: { type: string }
          description: Filter objects by pack name
      responses:
        "200":
          description: Graph state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"

  /activegraph/packs:
    get:
      operationId: getPacks
      tags: [activegraph]
      summary: Get loaded packs
      description: Returns metadata for all loaded packs including object types, relation types, and behaviors
      responses:
        "200":
          description: Pack list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PacksResponse"

  /activegraph/frames:
    get:
      operationId: getFrames
      tags: [activegraph]
      summary: Get frames
      description: Returns active and recently completed execution frames
      responses:
        "200":
          description: Frame list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FramesResponse"

  /activegraph/summary:
    get:
      operationId: getSummary
      tags: [activegraph]
      summary: Get graph summary
      description: Returns aggregate counts and stats for quick overview
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"

  /activegraph/chat:
    post:
      operationId: sendChat
      tags: [activegraph]
      summary: Send chat message
      description: Sends a message to the ActiveGraph chat runtime and returns the response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Chat response with frame id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "503":
          description: Runtime not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activegraph/reset:
    post:
      operationId: resetRuntime
      tags: [activegraph]
      summary: Reset runtime
      description: Resets the demo runtime to its initial seeded state
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResponse"

  /activegraph/chat/config:
    get:
      operationId: getChatConfig
      tags: [activegraph]
      summary: Get chat LLM config
      description: Returns the resolved chat LLM mode (mock/live), provider, model, and per-provider key presence. No secret values.
      responses:
        "200":
          description: Chat LLM configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConfig"
    post:
      operationId: updateChatConfig
      tags: [activegraph]
      summary: Update chat LLM config
      description: Selects the chat provider and/or model (non-secret prefs) and hot-swaps the live provider. Secret values are set via /activegraph/secrets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatConfigInput"
      responses:
        "200":
          description: Updated chat LLM configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConfig"

  /activegraph/secrets:
    get:
      operationId: listSecrets
      tags: [activegraph]
      summary: List registered secrets
      description: Lists name-only credential references and whether each value is currently present in-process. Secret values are never returned.
      responses:
        "200":
          description: Registered credential references
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretsResponse"
    post:
      operationId: setSecret
      tags: [activegraph]
      summary: Set a secret
      description: Registers a secret by name and sets its value for in-process use only. The value is never written to the graph, event log, disk, or response. May upgrade chat to a live LLM.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretInput"
      responses:
        "200":
          description: Updated secrets list (with refreshed chat config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretsResponse"

  /activegraph/profile:
    get:
      operationId: getProfile
      tags: [activegraph]
      summary: Get agent profile
      description: Returns the active agent profile with its personality, goals, and standing instructions. exists=false when no profile has been created yet.
      responses:
        "200":
          description: Agent profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
    post:
      operationId: updateProfile
      tags: [activegraph]
      summary: Update agent profile identity
      description: Updates the active agent profile's name, mission, personality description, and owner name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateInput"
      responses:
        "200":
          description: Updated profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /activegraph/profile/seed:
    post:
      operationId: seedProfile
      tags: [activegraph]
      summary: Seed the default agent profile
      description: Creates the seeded default agent profile when none exists yet. Idempotent — returns the existing profile if one is already present.
      responses:
        "200":
          description: Profile view after seeding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /activegraph/profile/personality:
    post:
      operationId: updatePersonality
      tags: [activegraph]
      summary: Update personality profile
      description: Upserts the global personality profile (tone, verbosity, formality) for the active agent profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalityInput"
      responses:
        "200":
          description: Updated profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /activegraph/profile/goal:
    post:
      operationId: saveGoal
      tags: [activegraph]
      summary: Create or update a goal
      description: Creates a new goal, or updates an existing one when an id is supplied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "200":
          description: Updated profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /activegraph/profile/goal/delete:
    post:
      operationId: deleteGoal
      tags: [activegraph]
      summary: Delete a goal
      description: Removes a goal from the graph by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteInput"
      responses:
        "200":
          description: Updated profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /activegraph/profile/instruction:
    post:
      operationId: saveInstruction
      tags: [activegraph]
      summary: Create or update a standing instruction
      description: Creates a new standing instruction, or updates an existing one when an id is supplied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionInput"
      responses:
        "200":
          description: Updated profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /activegraph/profile/instruction/delete:
    post:
      operationId: deleteInstruction
      tags: [activegraph]
      summary: Delete a standing instruction
      description: Removes a standing instruction from the graph by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteInput"
      responses:
        "200":
          description: Updated profile view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── ActiveGraph Core Types ────────────────────────────────────────────────

    GraphObject:
      type: object
      required: [id, type, pack]
      properties:
        id:      { type: string }
        type:    { type: string }
        pack:    { type: string }
        data:    { type: object }
        created_at: { type: ["string", "null"] }

    GraphRelation:
      type: object
      required: [id, type, source_id, target_id]
      properties:
        id:        { type: string }
        type:      { type: string }
        source_id: { type: string }
        target_id: { type: string }
        data:      { type: object }

    TraceEvent:
      type: object
      required: [id, event_type, timestamp]
      properties:
        id:            { type: string }
        event_type:    { type: string }
        timestamp:     { type: string }
        pack:          { type: ["string", "null"] }
        behavior_name: { type: ["string", "null"] }
        frame_id:      { type: ["string", "null"] }
        object_type:   { type: ["string", "null"] }
        object_id:     { type: ["string", "null"] }
        payload:       { type: object }

    BehaviorInfo:
      type: object
      required: [name]
      properties:
        name:         { type: string }
        trigger:      { type: ["string", "null"] }
        description:  { type: ["string", "null"] }
        creates:
          type: array
          items: { type: string }
        capabilities:
          type: array
          items: { type: string }

    ObjectTypeInfo:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: ["string", "null"] }

    RelationTypeInfo:
      type: object
      required: [name]
      properties:
        name:         { type: string }
        source_types:
          type: array
          items: { type: string }
        target_types:
          type: array
          items: { type: string }
        description:  { type: ["string", "null"] }

    PackInfo:
      type: object
      required: [name, version]
      properties:
        name:         { type: string }
        version:      { type: string }
        description:  { type: ["string", "null"] }
        object_types:
          type: array
          items: { $ref: "#/components/schemas/ObjectTypeInfo" }
        relation_types:
          type: array
          items: { $ref: "#/components/schemas/RelationTypeInfo" }
        behaviors:
          type: array
          items: { $ref: "#/components/schemas/BehaviorInfo" }

    Frame:
      type: object
      required: [id, status]
      properties:
        id:         { type: string }
        status:     { type: string }
        frame_type: { type: ["string", "null"] }
        started_at: { type: ["string", "null"] }
        ended_at:   { type: ["string", "null"] }
        event_count: { type: integer }
        events:
          type: array
          items: { $ref: "#/components/schemas/TraceEvent" }

    TypeCount:
      type: object
      required: [type, pack, count]
      properties:
        type:  { type: string }
        pack:  { type: string }
        count: { type: integer }

    # ── Response Envelopes ────────────────────────────────────────────────────

    TraceResponse:
      type: object
      required: [events, total]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/TraceEvent" }
        total:   { type: integer }
        offset:  { type: integer }
        limit:   { type: integer }

    GraphResponse:
      type: object
      required: [objects, relations]
      properties:
        objects:
          type: array
          items: { $ref: "#/components/schemas/GraphObject" }
        relations:
          type: array
          items: { $ref: "#/components/schemas/GraphRelation" }
        object_count: { type: integer }
        relation_count: { type: integer }

    PacksResponse:
      type: object
      required: [packs]
      properties:
        packs:
          type: array
          items: { $ref: "#/components/schemas/PackInfo" }
        total: { type: integer }

    FramesResponse:
      type: object
      required: [frames]
      properties:
        frames:
          type: array
          items: { $ref: "#/components/schemas/Frame" }
        total: { type: integer }

    SummaryResponse:
      type: object
      required: [object_count, relation_count, event_count, pack_count, frame_count]
      properties:
        object_count:    { type: integer }
        relation_count:  { type: integer }
        event_count:     { type: integer }
        pack_count:      { type: integer }
        frame_count:     { type: integer }
        by_type:
          type: array
          items: { $ref: "#/components/schemas/TypeCount" }
        runtime_ready:   { type: boolean }

    # ── Chat ─────────────────────────────────────────────────────────────────

    ChatMessageInput:
      type: object
      required: [content]
      properties:
        content:    { type: string }
        session_id: { type: ["string", "null"] }
        user_ref:   { type: ["string", "null"] }

    ChatResponse:
      type: object
      required: [content, frame_id]
      properties:
        content:       { type: string }
        frame_id:      { type: string }
        user_message:  { type: string }
        session_id:    { type: ["string", "null"] }
        turn_id:       { type: ["string", "null"] }
        llm_mode:      { type: ["string", "null"] }
        event_count:   { type: integer }
        new_objects:
          type: array
          items: { type: string }

    ResetResponse:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    # ── Chat LLM config & secrets ──────────────────────────────────────────────

    ChatProvider:
      type: object
      required: [id, label, key_env, key_present]
      properties:
        id:          { type: string }
        label:       { type: string }
        key_env:     { type: string }
        key_present: { type: boolean }

    ChatConfig:
      type: object
      required: [mode, key_present, providers]
      properties:
        mode:        { type: string, description: "mock or live" }
        provider:    { type: ["string", "null"] }
        model:       { type: ["string", "null"] }
        key_present: { type: boolean }
        providers:
          type: array
          items: { $ref: "#/components/schemas/ChatProvider" }

    ChatConfigInput:
      type: object
      properties:
        provider: { type: ["string", "null"], description: "Provider id (openai, anthropic) or empty to auto-detect" }
        model:    { type: ["string", "null"], description: "Model name; empty to use provider default" }

    SecretRef:
      type: object
      required: [name, value_present]
      properties:
        id:            { type: ["string", "null"] }
        name:          { type: string }
        provider_hint: { type: ["string", "null"] }
        scope:         { type: ["string", "null"] }
        value_present: { type: boolean }
        last_used_at:  { type: ["string", "null"] }
        use_count:     { type: integer }

    SecretsResponse:
      type: object
      required: [credentials, total]
      properties:
        credentials:
          type: array
          items: { $ref: "#/components/schemas/SecretRef" }
        total: { type: integer }
        chat_config: { $ref: "#/components/schemas/ChatConfig" }

    SecretInput:
      type: object
      required: [name, value]
      properties:
        name:          { type: string, description: "Credential / env var name, e.g. OPENAI_API_KEY" }
        value:         { type: string, description: "Secret value — used in-process only, never persisted" }
        provider_hint: { type: ["string", "null"] }

    # ── Agent profile ──────────────────────────────────────────────────────────

    ProfileInfo:
      type: object
      required: [id, name]
      properties:
        id:      { type: string }
        name:    { type: string }
        mission: { type: string }
        personality_description: { type: string }
        owner_name: { type: ["string", "null"] }
        version: { type: string }
        active:  { type: boolean }

    PersonalityInfo:
      type: object
      required: [tone, verbosity, formality]
      properties:
        id:        { type: ["string", "null"] }
        tone:      { type: string }
        verbosity: { type: string }
        formality: { type: string }

    GoalInfo:
      type: object
      required: [id, text]
      properties:
        id:       { type: string }
        text:     { type: string }
        priority: { type: string }
        status:   { type: string }
        domain:   { type: ["string", "null"] }

    InstructionInfo:
      type: object
      required: [id, text]
      properties:
        id:       { type: string }
        text:     { type: string }
        scope:    { type: string }
        priority: { type: integer }
        active:   { type: boolean }
        applies_to_channel:      { type: ["string", "null"] }
        applies_to_audience_role: { type: ["string", "null"] }

    ProfileResponse:
      type: object
      required: [exists, goals, instructions]
      properties:
        exists:      { type: boolean }
        profile:     { $ref: "#/components/schemas/ProfileInfo" }
        personality: { $ref: "#/components/schemas/PersonalityInfo" }
        goals:
          type: array
          items: { $ref: "#/components/schemas/GoalInfo" }
        instructions:
          type: array
          items: { $ref: "#/components/schemas/InstructionInfo" }

    ProfileUpdateInput:
      type: object
      properties:
        name:    { type: string }
        mission: { type: string }
        personality_description: { type: string }
        owner_name: { type: ["string", "null"] }

    PersonalityInput:
      type: object
      required: [tone, verbosity, formality]
      properties:
        tone:      { type: string, description: "neutral, warm, direct, formal, casual, technical" }
        verbosity: { type: string, description: "concise, balanced, detailed" }
        formality: { type: string, description: "informal, neutral, formal" }

    GoalInput:
      type: object
      required: [text]
      properties:
        id:       { type: ["string", "null"], description: "Goal id to update; omit to create" }
        text:     { type: string }
        priority: { type: string, description: "low, medium, high, critical" }
        status:   { type: string, description: "active, paused, completed, cancelled" }
        domain:   { type: ["string", "null"] }

    InstructionInput:
      type: object
      required: [text]
      properties:
        id:       { type: ["string", "null"], description: "Instruction id to update; omit to create" }
        text:     { type: string }
        scope:    { type: string }
        priority: { type: integer, description: "0-100, higher assembled first" }
        active:   { type: boolean }
        applies_to_channel:      { type: ["string", "null"] }
        applies_to_audience_role: { type: ["string", "null"] }

    DeleteInput:
      type: object
      required: [id]
      properties:
        id: { type: string }
