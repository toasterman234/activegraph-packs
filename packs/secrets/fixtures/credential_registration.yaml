# Fixture: Credential Registration
#
# Demonstrates the Secrets Pack behavior chain:
#   1. A CredentialRef is created (name only — no secret value)
#   2. secret_usage_recorder fires and creates a SecretUsageEvent

name: credential_registration
description: >
  A credential reference for the OpenAI API is registered in the graph.
  The secret_usage_recorder behavior creates an audit event.
  The actual API key is never stored anywhere in the graph.

objects:
  - type: credential_ref
    data:
      name: OPENAI_API_KEY
      scope: write
      provider_hint: openai
      last_used_at: null
      use_count: 0
      enabled: true
      metadata: {}

  - type: credential_ref
    data:
      name: STRIPE_SK
      scope: write
      provider_hint: stripe
      last_used_at: null
      use_count: 0
      enabled: true
      metadata: {}

expected_outputs:
  secret_usage_events:
    min_count: 2
    each_has:
      - credential_ref_name
      - timestamp
